{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.cluster.name }}-minio-setup
  namespace: {{ .Values.cluster.namespace | default .Release.Namespace }}
  labels:
    {{- include "postgres-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        {{- include "postgres-chart.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.cluster.name }}-minio-setup
      volumes:
        - name: setup-script
          configMap:
            name: {{ .Values.cluster.name }}-minio-setup-script
            defaultMode: 0755
        - name: shared
          emptyDir: {}
      initContainers:
        - name: minio-setup
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command: ["/scripts/minio-setup.sh"]
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
            - name: shared
              mountPath: /shared
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cluster.name }}-minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cluster.name }}-minio-root
                  key: rootPassword
      containers:
        - name: kubectl-setup
          image: bitnami/kubectl:latest
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command: ["/scripts/kubectl-setup.sh"]
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
            - name: shared
              mountPath: /shared
{{- end }}

