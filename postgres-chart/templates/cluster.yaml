apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
  namespace: {{ .Values.cluster.namespace | default .Release.Namespace }}
  labels:
    {{- include "postgres-chart.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  instances: {{ .Values.cluster.instances }}

  enableSuperuserAccess: {{ .Values.cluster.enableSuperuserAccess | default false }}

  startDelay: {{ .Values.cluster.startDelay | default 3600 }}
  stopDelay: {{ .Values.cluster.stopDelay | default 1800 }}
  switchoverDelay: {{ .Values.cluster.switchoverDelay | default 3600 }}
  failoverDelay: {{ .Values.cluster.failoverDelay | default 0 }}

  replicationSlots:
    highAvailability:
      enabled: true

  storage:
    size: {{ .Values.cluster.storage.size }}
    {{- if .Values.cluster.storage.storageClass }}
    storageClass: {{ .Values.cluster.storage.storageClass }}
    {{- end }}

  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ImageCatalog
    name: {{ .Values.imageCatalog.name }}
    major: {{ .Values.cluster.image.catalog.major }}

  bootstrap:
    initdb:
      database: {{ .Values.cluster.database.name }}
      owner: {{ .Values.cluster.database.owner }}
      secret:
        name: {{ .Values.secret.name | default (printf "%s-secret" .Values.cluster.name) }}

{{/*  {{- if .Values.cluster.extensions.enabled }}*/}}
{{/*  extensions:*/}}
{{/*    {{- range .Values.cluster.extensions }}*/}}
{{/*    - name: {{ .name }}*/}}
{{/*      ensure: {{ .ensure | default "present" }}*/}}
{{/*    {{- end }}*/}}
{{/*  {{- end }}*/}}

  postgresql:
    shared_preload_libraries:
      {{- range .Values.cluster.postgresql.shared_preload_libraries }}
      - {{ . }}
      {{- end }}
    parameters:
      {{- range $key, $value := .Values.cluster.postgresql.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    pg_hba:
      {{- if .Values.config.pg_hba }}
      {{- toYaml .Values.config.pg_hba | nindent 6 }}
      {{- else }}
      - host all all 0.0.0.0/0 md5
      - host all all ::/0 md5
      {{- end }}

  {{- if .Values.resources }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  {{- end }}

  {{- if .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml .Values.nodeSelector | nindent 4 }}
  {{- end }}

  {{- if .Values.tolerations }}
  tolerations:
    {{- toYaml .Values.tolerations | nindent 4 }}
  {{- end }}

  {{- if .Values.affinity }}
  affinity:
    {{- toYaml .Values.affinity | nindent 4 }}
  {{- end }}

  {{- if .Values.backup.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.backup.objectStoreName }}
  {{- end }}
