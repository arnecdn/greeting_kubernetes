{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.cluster.name }}-minio-setup-script
  namespace: {{ .Values.cluster.namespace | default .Release.Namespace }}
  labels:
    {{- include "postgres-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  setup.sh: |
    #!/bin/sh
    set -e

    echo "==> Configuring MinIO client..."
    mc alias set myminio {{ .Values.minio.endpoint }} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}

    echo "==> Creating bucket '{{ .Values.minio.bucketName }}' (if not exists)..."
    mc mb --ignore-existing myminio/{{ .Values.minio.bucketName }}

    echo "==> Creating service account for Barman Cloud..."
    SA_OUTPUT=$(mc admin user svcacct add myminio ${MINIO_ROOT_USER} --name barman-backup 2>&1 || true)

    # If the service account already exists, remove and recreate it
    if echo "$SA_OUTPUT" | grep -q "already exists"; then
      echo "==> Service account already exists, removing and recreating..."
      mc admin user svcacct rm myminio barman-backup
      SA_OUTPUT=$(mc admin user svcacct add myminio ${MINIO_ROOT_USER} --name barman-backup)
    fi

    echo "==> Parsing credentials..."
    ACCESS_KEY=$(echo "$SA_OUTPUT" | grep "Access Key" | awk '{print $NF}')
    SECRET_KEY=$(echo "$SA_OUTPUT" | grep "Secret Key" | awk '{print $NF}')

    if [ -z "$ACCESS_KEY" ] || [ -z "$SECRET_KEY" ]; then
      echo "ERROR: Failed to parse credentials from service account output"
      echo "Output was: $SA_OUTPUT"
      exit 1
    fi

    echo "==> Verifying bucket access with new credentials..."
    mc alias set verify {{ .Values.minio.endpoint }} "${ACCESS_KEY}" "${SECRET_KEY}"
    mc ls verify/{{ .Values.minio.bucketName }} > /dev/null 2>&1
    echo "==> Bucket access verified."

    echo "==> Creating/updating Kubernetes secret '{{ .Values.backup.s3SecretName }}'..."
    KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    KUBE_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    KUBE_NS={{ .Values.cluster.namespace | default .Release.Namespace }}
    KUBE_API=https://kubernetes.default.svc

    B64_ACCESS_KEY=$(echo -n "${ACCESS_KEY}" | base64)
    B64_SECRET_KEY=$(echo -n "${SECRET_KEY}" | base64)

    # Try to get existing secret
    HTTP_CODE=$(wget --header="Authorization: Bearer ${KUBE_TOKEN}" \
      --ca-certificate="${KUBE_CA}" \
      --server-response \
      -O /dev/null \
      "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/secrets/{{ .Values.backup.s3SecretName }}" 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}')

    if [ "$HTTP_CODE" = "200" ]; then
      echo "==> Updating existing secret..."
      wget --header="Authorization: Bearer ${KUBE_TOKEN}" \
        --header="Content-Type: application/strategic-merge-patch+json" \
        --ca-certificate="${KUBE_CA}" \
        --method=PATCH \
        --body-data="{\"data\":{\"{{ .Values.backup.s3AccessKeyIdKey }}\":\"${B64_ACCESS_KEY}\",\"{{ .Values.backup.s3AccessSecretKeyKey }}\":\"${B64_SECRET_KEY}\"}}" \
        -O /dev/null \
        "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/secrets/{{ .Values.backup.s3SecretName }}"
    else
      echo "==> Creating new secret..."
      wget --header="Authorization: Bearer ${KUBE_TOKEN}" \
        --header="Content-Type: application/json" \
        --ca-certificate="${KUBE_CA}" \
        --method=POST \
        --body-data="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"{{ .Values.backup.s3SecretName }}\",\"namespace\":\"${KUBE_NS}\"},\"type\":\"Opaque\",\"data\":{\"{{ .Values.backup.s3AccessKeyIdKey }}\":\"${B64_ACCESS_KEY}\",\"{{ .Values.backup.s3AccessSecretKeyKey }}\":\"${B64_SECRET_KEY}\"}}" \
        -O /dev/null \
        "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/secrets"
    fi

    echo "==> MinIO setup complete!"
    echo "    Bucket: {{ .Values.minio.bucketName }}"
    echo "    Secret: {{ .Values.backup.s3SecretName }}"
{{- end }}

