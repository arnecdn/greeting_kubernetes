# Set enabled = true to add the default logs dashboards to the local Grafana
dashboards:
  logs:
    enabled: true
kubeStateMetrics:
  # Scrape https://github.com/kubernetes/kube-state-metrics by default
  enabled: true
  # This endpoint is created when the helm chart from
  # https://artifacthub.io/packages/helm/prometheus-community/kube-state-metrics/
  # is used. Change this if kube-state-metrics is installed somewhere else.
  endpoint: kube-state-metrics.kube-state-metrics.svc.cluster.local:8080
# The following are configuration for the dependencies.
# These should usually not be changed.
loki:
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: 2024-03-29
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage:
      type: "s3"
      s3:
        insecure: true
        s3ForcePathStyle: true
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
    structuredConfig:
      common:
        replication_factor: 1
        storage:
          s3:
            access_key_id: "${rootUser}"
            endpoint: "{{ .Release.Name }}-minio.{{ .Release.Namespace }}.svc:9000"
            secret_access_key: "${rootPassword}"
      compactor:
        retention_enabled: true
        delete_request_store: s3
      limits_config:
        retention_period: 30d
  lokiCanary:
    enabled: false
  test:
    enabled: false
  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false
  # Scale down Loki for minikube
  write:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    extraArgs:
      - "-config.expand-env=true"
    extraEnvFrom:
      - secretRef:
          name: "minio"
  read:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    extraArgs:
      - "-config.expand-env=true"
    extraEnvFrom:
      - secretRef:
          name: "minio"
  backend:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    extraArgs:
      - "-config.expand-env=true"
    extraEnvFrom:
      - secretRef:
          name: "minio"
  chunksCache:
    allocatedMemory: 512
    resources:
      requests:
        cpu: 50m
      limits: {}
  resultsCache:
    allocatedMemory: 256
    resources:
      requests:
        cpu: 50m
      limits: {}
alloy:
  alloy:
    clustering:
      enabled: true
    configMap:
      create: true
      name: ""
      key: "config.alloy"
      content: |
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }

          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            logs    = [otelcol.processor.batch.default.input]
            traces  = [otelcol.processor.batch.default.input]
            metrics = [otelcol.processor.batch.default.input]
          }
        }

        otelcol.processor.batch "default" {
          output {
            logs    = [otelcol.exporter.loki.default.input]
            traces  = [otelcol.exporter.otlphttp.tempo.input]
            metrics = [otelcol.exporter.prometheus.default.input]
          }
        }

        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        prometheus.remote_write "default" {
          endpoint {
            url = "http://meta-monitoring-mimir-nginx.meta-monitoring.svc.cluster.local:80/api/v1/push"
          }
        }

        otelcol.exporter.otlphttp "tempo" {
          client {
            endpoint = "http://meta-monitoring-tempo-distributor.meta-monitoring.svc.cluster.local:4318"
          }
        }

        otelcol.exporter.loki "default" {
          forward_to = [loki.write.local.receiver]
        }

        loki.write "local" {
          endpoint {
            url = "http://meta-monitoring-loki-gateway.meta-monitoring.svc.cluster.local:80/loki/api/v1/push"
          }
        }
    resources:
      requests:
        cpu: '100m'
        memory: '256Mi'
      limits:
        memory: '1Gi'
    extraPorts:
      - name: "otel"
        port: 4317
        targetPort: 4317
        containerPort: 4317
        protocol: "TCP"
      - name: "thrifthttp"
        port: 14268
        targetPort: 14268
        containerPort: 14268
        protocol: "TCP"
      - name: "otlp-http"
        port: 4318
        targetPort: 4318
        containerPort: 4318
        protocol: "TCP"
  controller:
    type: "statefulset"
    replicas: 1
    autoscaling:
      enabled: false
  service:
    enabled: true
    type: ClusterIP
mimir-distributed:
  minio:
    enabled: false
  global:
    extraEnvFrom:
      - secretRef:
          name: "minio"
  mimir:
    structuredConfig:
      ingester:
        ring:
          replication_factor: 1
      alertmanager:
        sharding_ring:
          replication_factor: 1
      store_gateway:
        sharding_ring:
          replication_factor: 1
      alertmanager_storage:
        s3:
          bucket_name: mimir-ruler
      blocks_storage:
        backend: s3
        s3:
          bucket_name: mimir-tsdb
      ruler_storage:
        s3:
          bucket_name: mimir-ruler
      common:
        storage:
          backend: s3
          s3:
            bucket_name: mimir-ruler
            access_key_id: "${rootUser}"
            endpoint: "{{ .Release.Name }}-minio.{{ .Release.Namespace }}.svc:9000"
            secret_access_key: "${rootPassword}"
            insecure: true
      limits:
        compactor_blocks_retention_period: 30d
  # Scale down Mimir for minikube
  alertmanager:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  compactor:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  distributor:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  ingester:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
    extraArgs:
      "config.expand-env": "true"
  overrides_exporter:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    extraArgs:
      "config.expand-env": "true"
  querier:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  query_frontend:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  query_scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    extraArgs:
      "config.expand-env": "true"
  ruler:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  store_gateway:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    extraArgs:
      "config.expand-env": "true"
  rollout_operator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  nginx:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  chunks-cache:
    replicas: 1
    allocatedMemory: 512
    maxItemMemory: 256
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  index-cache:
    replicas: 0
  metadata-cache:
    replicas: 0
  results-cache:
    replicas: 1
    allocatedMemory: 256
    maxItemMemory: 128
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
tempo-distributed:
  tempo:
    structuredConfig:
      overrides:
        max_bytes_per_trace: 20000000
      ingester:
        lifecycler:
          ring:
            replication_factor: 1
      storage:
        trace:
          backend: s3
          s3:
            bucket: tempo
            endpoint: "{{ .Release.Name }}-minio.{{ .Release.Namespace }}.svc:9000"
            access_key: "${rootUser}"
            secret_key: "${rootPassword}"
            insecure: true
  # Scale down Tempo for minikube
  distributor:
