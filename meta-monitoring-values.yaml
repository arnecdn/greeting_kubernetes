# Specify the namespaces to monitor here
# By default the chart will monitor the namespace it is installed in
# namespacesToMonitor:
# - loki
# The name of the cluster where this will be installed
clusterLabelValue: "meta-monitoring"
# Set to true to write logs, metrics or traces to Grafana Cloud
# The secrets have to be created first
cloud:
  logs:
    enabled: false
    secret: "logs"
  metrics:
    enabled: false
    secret: "metrics"
  traces:
    enabled: false
    secret: "traces"
# Set to true for a local version of logs, metrics or traces
local:
  grafana:
    enabled: true
  logs:
    enabled: true
  metrics:
    enabled: true
  traces:
    enabled: true
  minio:
    enabled: true  # This should be set to true if any of the previous is enabled
grafana:
  version: 11.6.1
  # Grafana admin credentials
  # The meta-monitoring chart does not natively inject admin credentials.
  # After install/upgrade, create the secret and patch the deployment:
  #
  #   kubectl create secret generic grafana-admin -n meta \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password=<your-password>
  #
  #   kubectl patch deployment grafana -n meta --type='json' -p='[
  #     {"op": "add", "path": "/spec/template/spec/containers/0/env", "value": [
  #       {"name": "GF_SECURITY_ADMIN_USER", "valueFrom": {"secretKeyRef": {"name": "grafana-admin", "key": "admin-user"}}},
  #       {"name": "GF_SECURITY_ADMIN_PASSWORD", "valueFrom": {"secretKeyRef": {"name": "grafana-admin", "key": "admin-password"}}}
  #     ]}
  #   ]'
  #
  # Gateway ingress configuration
  ingress:
    # -- Specifies whether an ingress for the gateway should be created
    enabled: true
    # -- Ingress Class Name. MAY be required for Kubernetes versions >= 1.18
    ingressClassName: ""
    # -- Annotations for the gateway ingress
    annotations: {}
    # -- Labels for the gateway ingress
    labels: {}
    # -- Hosts configuration for the gateway ingress, passed through the `tpl` function to allow templating
    hosts:
      - host: monitoring.example.com
        paths:
          - path: /
            # -- pathType (e.g. ImplementationSpecific, Prefix, .. etc.) might also be required by some Ingress Controllers
            pathType: Prefix
            # backend:
            #   service:
            #     name: TODO
            #     port:
            #       number: TODO
    # -- TLS configuration for the gateway ingress. Hosts passed through the `tpl` function to allow templating
    #tls:
    #  - secretName: grafana-tls
    #    hosts:
    #      - monitoring.example.com
logs:
  # Adding regexes here will add a stage.replace block for logs. For more information see
  # https://grafana.com/docs/agent/latest/flow/reference/components/loki.process/#stagereplace-block
  piiRegexes: null # This example replaces the word after password with *****
  # - expression: "password (\\\\S+)"
  #   source: ""         # Empty uses the log message
  #   replace: "*****""
  # The lines matching these will be kept in Loki
  retain:
    # This shows the queries
    - executing query
    - caller=metrics.go
    # This shows any errors
    - level=error
    - level=warn
    # Log lines for delete requests
    - delete request for user added
    - Started processing delete request
    - delete request for user marked as processed
  # This shows the ingest requests and is very noisy. Uncomment to include.
  # - caller=push.go
  # Additional log lines to retain
  extraLogs: []
